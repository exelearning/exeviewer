server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # sw.js must not be cached so updates are picked up immediately
    location = /sw.js {
        add_header Cache-Control "no-store";
    }

    # /viewer/* paths are handled by the Service Worker; server returns 404
    location /viewer/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
